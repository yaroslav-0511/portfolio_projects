services:
  tests:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mental_support
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["python", "-m", "pytest", "-q"]
